name: Build realtime release

# 触发条件：手动触发或推送触发
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**.py"
  push:
    branches:
      - main
    paths:
      - "**.py"

# 权限设置：需要写入仓库内容的权限
permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      version: ${{ github.ref_name }}
